name: schema-compatibility

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'scripts/**'
      - '.github/workflows/schema-compatibility.yml'
  push:
    branches:
      - main
    paths:
      - 'schemas/**'

jobs:
  validate:
    name: Parse all Avro schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fastavro
        run: |
          python -m pip install --upgrade pip
          pip install fastavro==1.9.4

      - name: Run validate.sh
        run: ./scripts/validate.sh

  compatibility:
    name: Check BACKWARD compatibility against staging registry
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install helpers
        run: |
          python -m pip install --upgrade pip
          pip install fastavro==1.9.4 requests

      - name: Detect changed schemas
        id: changed
        run: |
          {
            echo "changed<<EOF"
            git diff --name-only origin/${GITHUB_BASE_REF:-main}...HEAD -- 'schemas/**/*.avsc' || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if no schema changes
        if: steps.changed.outputs.changed == ''
        run: |
          echo "No Avro schema changes in this PR — nothing to check."

      - name: Register changed schemas against staging registry
        if: steps.changed.outputs.changed != ''
        env:
          SCHEMA_REGISTRY_URL: ${{ secrets.SCHEMA_REGISTRY_STAGING_URL }}
          SCHEMA_REGISTRY_USER: ${{ secrets.SCHEMA_REGISTRY_STAGING_USER }}
          SCHEMA_REGISTRY_PASSWORD: ${{ secrets.SCHEMA_REGISTRY_STAGING_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${SCHEMA_REGISTRY_URL:-}" ]]; then
            echo "::warning::SCHEMA_REGISTRY_STAGING_URL not configured — skipping compatibility check."
            echo "         Configure the secret in repository settings to enable this check."
            exit 0
          fi

          for f in ${{ steps.changed.outputs.changed }}; do
            # Best-effort default subject from the file name. Production
            # subjects follow docs/subject-naming.md (TopicNameStrategy,
            # `<topic>-value`).
            subject="$(basename "${f}" .avsc)"
            echo "::group::Registering ${f} -> subject '${subject}'"
            # Normalise the JSON to a single line and POST.
            schema_json="$(jq -c . "${f}")"
            http_code=$(curl -fsSL -u "${SCHEMA_REGISTRY_USER}:${SCHEMA_REGISTRY_PASSWORD}" \
              -o /tmp/registry-response.json \
              -w '%{http_code}' \
              -X POST \
              -H 'Content-Type: application/vnd.schemaregistry.v1+json' \
              --data-binary "$(jq -nc --arg s "${schema_json}" '{schema: $s}')" \
              "${SCHEMA_REGISTRY_URL}/subjects/${subject}/versions?compatibility=BACKWARD" || echo "curl_failed")
            if [[ "${http_code}" == "200" ]]; then
              echo "  registered OK"
            elif [[ "${http_code}" == "409" ]]; then
              echo "  INCOMPATIBLE — Schema Registry rejected the change"
              cat /tmp/registry-response.json
              exit 1
            else
              echo "  unexpected HTTP ${http_code} from registry"
              cat /tmp/registry-response.json
              exit 1
            fi
            echo "::endgroup::"
          done
