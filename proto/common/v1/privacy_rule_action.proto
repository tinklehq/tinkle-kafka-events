// Action of a per-target privacy rule override. The combination of
// (user_id, target_user_id, kind) plus this action determines whether
// the target is allowed or denied to see the owner's setting.
//
// Owned by the privacy-service event contract; lives under
// proto/me/tinkle/events/common/v1/ only so other packages can
// reference it without a circular import. The package is
// me.tinkle.events.common.v1 intentionally.
syntax = "proto3";

package me.tinkle.events.common.v1;

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/common/v1;eventscommonv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.common.v1";

enum PrivacyRuleAction {
  // Default zero value. Used when a privacy rule has not been
  // initialised; consumers SHOULD treat this as "no override".
  PRIVACY_RULE_ACTION_UNSPECIFIED = 0;

  // The target is explicitly allowed to see the owner's setting,
  // overriding any broader restriction in place.
  PRIVACY_RULE_ACTION_ALLOW = 1;

  // The target is explicitly denied from seeing the owner's setting,
  // overriding any broader permission in place.
  PRIVACY_RULE_ACTION_DENY = 2;
}
