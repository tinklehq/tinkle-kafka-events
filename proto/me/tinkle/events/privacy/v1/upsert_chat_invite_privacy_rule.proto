// Published by privacy-service when a chat-invite privacy rule
// override is created or updated.
// Event type discriminator: "upsert_chat_invite_privacy_rule".
// Topic: outbox.privacy.chat_invite. Aggregate: chat_invite.
syntax = "proto3";

package me.tinkle.events.privacy.v1;

import "me/tinkle/events/common/v1/privacy_rule_action.proto";

option go_package = "github.com/tinklehq/kafka-events/gen/go/me/tinkle/events/privacy/v1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.privacy.v1";

message UpsertChatInvitePrivacyRuleEvent {
  // Snowflake ID of the rule owner.
  int64 user_id = 1;

  // Snowflake ID of the rule target.
  int64 target_user_id = 2;

  // Allow or deny action for this target.
  me.tinkle.events.common.v1.PrivacyRuleAction action = 3;
}
