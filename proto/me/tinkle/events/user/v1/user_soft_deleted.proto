// Published by user-service when a user is soft-deleted (account
// deactivated but data retained for legal/audit purposes). Consumers
// should treat the user as inactive but retain projection data.
// Event type discriminator: "user_soft_deleted".
// Topic: outbox.user.event. Aggregate: event.
syntax = "proto3";

package me.tinkle.events.user.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/kafka-events/gen/go/me/tinkle/events/user/v1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.user.v1";

message UserSoftDeletedEvent {
  // Snowflake ID of the soft-deleted user.
  int64 user_id = 1;

  // Wall-clock instant at which the user was soft-deleted.
  google.protobuf.Timestamp deleted_at = 2;

  // Optional phone number in E.164 format. Empty string if the user
  // had no phone.
  optional string phone_number = 3;
}
