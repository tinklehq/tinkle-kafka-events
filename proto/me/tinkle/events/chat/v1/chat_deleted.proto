// Published by chat-service (muc) when a chat is deleted. Consumers
// should remove all chat-related state, archive any pending messages,
// and unsubscribe notification subscribers.
// Event type discriminator: "chat_deleted".
// Topic: outbox.chat.event. Aggregate: event.
syntax = "proto3";

package me.tinkle.events.chat.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/kafka-events/gen/go/me/tinkle/events/chat/v1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.chat.v1";

message ChatDeletedEvent {
  // Snowflake ID of the deleted chat.
  int64 chat_id = 1;

  // Wall-clock instant at which the deletion occurred.
  google.protobuf.Timestamp created_at = 2;
}
