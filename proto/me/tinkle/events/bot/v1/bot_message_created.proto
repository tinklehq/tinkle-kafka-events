// Published by bot-service when a bot sends a new message (via
// webhook reply, sendMessage RPC, etc.). Consumers (typically
// notification / search) should use this to project bot-authored
// messages.
// Event type discriminator: "bot_message_created".
// Topic: outbox.bot.event. Aggregate: event.
syntax = "proto3";

package me.tinkle.events.bot.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/kafka-events/gen/go/me/tinkle/events/bot/v1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.bot.v1";

message BotMessageCreatedEvent {
  // Snowflake ID of the bot that authored the message.
  int64 bot_id = 1;

  // Snowflake ID of the chat the message was sent into.
  int64 chat_id = 2;

  // Snowflake ID of the newly created message. Generated by
  // bot-service.
  int64 message_id = 3;

  // Type tag describing the message body. Examples: "text", "photo",
  // "document", "voice", "video", "sticker".
  string message_type = 4;

  // Raw message body. Encoding and schema are determined by
  // `message_type`; consumers dispatch on the type tag before
  // decoding.
  bytes payload = 5;

  // Snowflake ID of the message this message replies to. 0 if the
  // message is not a reply.
  int64 reply_to_message_id = 6;

  // Wall-clock instant at which the message was created.
  google.protobuf.Timestamp created_at = 7;
}
