// Published by chat-service when a user deletes a message for
// themselves. The target identifier is stable and is NOT rewritten
// for per-user deletion.
// Event type discriminator: "message_deleted". Aggregate: event.
syntax = "proto3";

package me.tinkle.events.message.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/kafka-events/gen/go/me/tinkle/events/message/v1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.message.v1";

message MessageDeletedEvent {
  // Snowflake peer ID of the user who requested deletion. The
  // deletion applies only to this user's view of the message.
  int64 requester_peer_id = 1;

  // Conversation identifier (stable; not rewritten for deletion).
  // Same format as MessageCreatedEvent.target.
  string target = 2;

  // Snowflake ID of the deleted message.
  int64 message_id = 3;

  // Wall-clock instant at which the message was deleted.
  google.protobuf.Timestamp deleted_at = 4;
}
