// Published by user-service when a new user account is created.
// Consumers should use this to initialise user-related projections
// (roster, presence, contacts, etc.).
// Event type discriminator: "user_created". Topic: outbox.user.event.
// Aggregate: event.
syntax = "proto3";

package tinkle.events.user.v1;

import "common/v1/user_status.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/user/v1;tinkleeventsuserv1";
option java_multiple_files = true;
option java_package = "me.tinkle.events.user.v1";

message UserCreatedEvent {
  // Snowflake ID of the newly created user.
  int64 user_id = 1;

  // Wall-clock instant at which the user was created.
  google.protobuf.Timestamp created_at = 2;

  // Optional phone number in E.164 format (e.g. +14155552671).
  // Empty string (the proto3 default) when the user registered
  // without a phone number. Useful for downstream phone-based
  // lookups and for cross-referencing identity events.
  optional string phone_number = 3;

  // Lifecycle status of the user at creation time. Always
  // USER_STATUS_ACTIVE for a freshly created account, but emitted
  // explicitly so consumers can drive status-aware projections
  // from a single source of truth.
  tinkle.events.common.v1.UserStatus status = 4;
}
