// Published by bot-service when a user presses an inline-keyboard
// button attached to a bot message.
// Event type discriminator: "bot_callback_query".
// Topic: outbox.bot.event. Aggregate: event.
syntax = "proto3";

package me.tinkle.events.bot.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/bot/v1;eventsbotv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.bot.v1";

message BotCallbackQueryEvent {
  // Snowflake ID of the bot that owns the inline keyboard.
  int64 bot_id = 1;

  // Snowflake ID of the user who pressed the button.
  int64 sender_user_id = 2;

  // Snowflake ID of the chat containing the message with the inline
  // keyboard.
  int64 chat_id = 3;

  // Snowflake ID of the message that owns the inline keyboard button
  // that was pressed.
  int64 message_id = 4;

  // Data payload that the bot attached to the button when it sent the
  // message. Opaque to the platform; the bot interprets it.
  string callback_data = 5;

  // Wall-clock instant at which the button was pressed.
  google.protobuf.Timestamp created_at = 6;
}
