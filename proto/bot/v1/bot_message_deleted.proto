// Published by bot-service when a bot deletes one of its own
// messages.
// Event type discriminator: "bot_message_deleted".
// Topic: outbox.bot.event. Aggregate: event.
syntax = "proto3";

package tinkle.events.bot.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/bot/v1;tinkleeventsbotv1";
option java_multiple_files = true;
option java_package = "me.tinkle.events.bot.v1";

message BotMessageDeletedEvent {
  // Snowflake ID of the bot that owns the message.
  int64 bot_id = 1;

  // Snowflake ID of the chat containing the deleted message.
  int64 chat_id = 2;

  // Snowflake ID of the deleted message.
  int64 message_id = 3;

  // Wall-clock instant at which the deletion occurred.
  google.protobuf.Timestamp deleted_at = 4;
}
