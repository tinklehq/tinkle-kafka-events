// Published by privacy-service when a user's phone_number privacy
// setting is created or updated.
// Event type discriminator: "upsert_phone_number_privacy".
// Topic: outbox.privacy.phone_number. Aggregate: phone_number.
syntax = "proto3";

package me.tinkle.events.privacy.v1;

import "common/v1/privacy_allow_value.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/privacy/v1;eventsprivacyv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.privacy.v1";

message UpsertPhoneNumberPrivacyEvent {
  // Snowflake ID of the setting owner.
  int64 user_id = 1;

  // New allow value for phone_number privacy.
  me.tinkle.events.common.v1.PrivacyAllowValue allow_value = 2;
}
