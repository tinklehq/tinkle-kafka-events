// Published by privacy-service when an "about" privacy rule override
// is deleted.
// Event type discriminator: "remove_about_privacy_rule".
// Topic: outbox.privacy.about. Aggregate: about.
syntax = "proto3";

package me.tinkle.events.privacy.v1;

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/privacy/v1;eventsprivacyv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.privacy.v1";

message RemoveAboutPrivacyRuleEvent {
  // Snowflake ID of the rule owner.
  int64 user_id = 1;

  // Snowflake ID of the rule target being removed.
  int64 target_user_id = 2;
}
