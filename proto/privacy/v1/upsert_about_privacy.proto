// Published by privacy-service when a user's "about" privacy setting
// is created or updated.
// Event type discriminator: "upsert_about_privacy".
// Topic: outbox.privacy.about. Aggregate: about.
syntax = "proto3";

package me.tinkle.events.privacy.v1;

import "common/v1/privacy_allow_value.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/privacy/v1;eventsprivacyv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.privacy.v1";

message UpsertAboutPrivacyEvent {
  // Snowflake ID of the setting owner.
  int64 user_id = 1;

  // New allow value for about privacy.
  me.tinkle.events.common.v1.PrivacyAllowValue allow_value = 2;
}
