// Published by privacy-service when a user's presence privacy
// setting is created or updated.
// Event type discriminator: "upsert_presence_privacy".
// Topic: outbox.privacy.presence. Aggregate: presence.
syntax = "proto3";

package tinkle.events.privacy.v1;

import "common/v1/privacy_allow_value.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/privacy/v1;tinkleeventsprivacyv1";
option java_multiple_files = true;
option java_package = "me.tinkle.events.privacy.v1";

message UpsertPresencePrivacyEvent {
  // Snowflake ID of the setting owner.
  int64 user_id = 1;

  // New allow value for presence privacy.
  tinkle.events.common.v1.PrivacyAllowValue allow_value = 2;
}
