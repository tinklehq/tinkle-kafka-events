// Published by chat-service when a message is successfully persisted.
// Consumers should use this to update message-related projections
// (search index, notification fan-out, unread counters, etc.).
// Event type discriminator: "message_created". Aggregate: event.
syntax = "proto3";

package tinkle.events.message.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/message/v1;tinkleeventsmessagev1";
option java_multiple_files = true;
option java_package = "me.tinkle.events.message.v1";

message MessageCreatedEvent {
  // Snowflake peer ID of the message sender. A peer is either a user
  // or a bot; the high bit of the ID distinguishes the two.
  int64 sender_peer_id = 1;

  // Conversation identifier. For DM conversations the format is
  // "userId:userId" (smaller ID first). For group conversations the
  // format is "CHAT:chatId".
  string target = 2;

  // Snowflake ID of the newly created message.
  int64 message_id = 3;

  // Wall-clock instant at which the event was created (typically the
  // message's server-side create time).
  google.protobuf.Timestamp created_at = 4;
}
