// Published by roster-service when multiple contacts are removed in
// a single bulk operation (ResetRoster). Contains ONLY contacts that
// had a resolved contact_user_id (> 0). Scoped to a single owner —
// one event per owner per batch operation.
// Event type discriminator: "roster_contact_batch_deleted".
// Topic: outbox.roster.event. Aggregate: event.
syntax = "proto3";

package tinkle.events.roster.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/roster/v1;tinkleeventsrosterv1";
option java_multiple_files = true;
option java_package = "me.tinkle.events.roster.v1";

message RosterContactBatchDeletedEvent {
  // Snowflake ID of the roster owner.
  int64 owner_user_id = 1;

  // Snowflake IDs of the contacts that were removed in this batch.
  repeated int64 contact_user_ids = 2;

  // Wall-clock instant at which the batch removal completed.
  google.protobuf.Timestamp created_at = 3;
}
