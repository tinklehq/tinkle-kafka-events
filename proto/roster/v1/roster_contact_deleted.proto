// Published by roster-service when a contact reference is removed.
// Fires only on the LAST row deletion for an (owner, contact) pair.
// Event type discriminator: "roster_contact_deleted".
// Topic: outbox.roster.event. Aggregate: event.
syntax = "proto3";

package me.tinkle.events.roster.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tinklehq/tinkle-kafka-events/proto/roster/v1;eventsrosterv1";
option java_multiple_files = true;
option java_package = "com.tinklehq.kafkaevents.me.tinkle.events.roster.v1";

message RosterContactDeletedEvent {
  // Snowflake ID of the roster owner (the user who removed the
  // contact).
  int64 owner_user_id = 1;

  // Snowflake ID of the contact that was removed.
  int64 contact_user_id = 2;

  // Wall-clock instant at which the contact reference was removed.
  google.protobuf.Timestamp created_at = 3;
}
